rules:
  # Apple Core / 必须优先直连：查找、天气、设置、热点探测、Apple Pay、推送
  - user_agent:
      match: "*com.apple.mobileme.fmip1"
      policy: DIRECT
  - user_agent:
      match: "*WeatherFoundation*"
      policy: DIRECT
  - domain:
      match: weather-data.apple.com
      policy: DIRECT

  - user_agent:
      match: "%E8%AE%BE%E7%BD%AE*"
      policy: DIRECT
  - user_agent:
      match: "FindMyFriends*"
      policy: DIRECT
  - user_agent:
      match: "FindMyiPhone*"
      policy: DIRECT
  - user_agent:
      match: "FMDClient*"
      policy: DIRECT
  - user_agent:
      match: "FMFD*"
      policy: DIRECT
  - user_agent:
      match: "fmflocatord*"
      policy: DIRECT

  - domain:
      match: captive.apple.com
      policy: DIRECT
  - domain:
      match: smp-device-content.apple.com
      policy: DIRECT
  - domain_keyword:
      match: smp-device
      policy: DIRECT
  - user_agent:
      match: "passd*"
      policy: DIRECT
  - user_agent:
      match: "Wallet*"
      policy: DIRECT

  - domain_keyword:
      match: push-apple
      policy: DIRECT
  - domain_keyword:
      match: push.apple
      policy: DIRECT

  # Apple 中国区 / iCloud 国区：直连
  - domain_keyword:
      match: "-cn.apple.com"
      policy: DIRECT
  - domain_suffix:
      match: icloud.com.cn
      policy: DIRECT
  - domain_suffix:
      match: apple.com.cn
      policy: DIRECT

  # Apple Store / 预约 / 设备配置：直连
  - domain_suffix:
      match: store.apple.com
      policy: DIRECT
  - domain:
      match: reserve-prime.apple.com
      policy: DIRECT
  - domain:
      match: sq-device.apple.com
      policy: DIRECT
  - domain:
      match: suconfig.apple.com
      policy: DIRECT
  - domain:
      match: xp-cdn.apple.com
      policy: DIRECT

  # Apple Cache / 本地缓存发现：直连
  - domain_suffix:
      match: lcdn-locator.apple.com
      policy: DIRECT
  - domain:
      match: lcdn-registration.apple.com
      policy: DIRECT

  # Apple 翻译 / Siri 相关基础服务：直连
  - domain:
      match: sequoia.apple.com
      policy: DIRECT
  - domain:
      match: seed-sequoia.siri.apple.com
      policy: DIRECT

  # Apple Maps / 定位 / Spotlight：默认直连，iPhone 定位更稳定
  - user_agent:
      match: "%E5%9C%B0%E5%9B%BE*"
      policy: DIRECT
  - user_agent:
      match: "com.apple.geod*"
      policy: DIRECT
  - user_agent:
      match: "com.apple.Maps"
      policy: DIRECT
  - user_agent:
      match: "geod*"
      policy: DIRECT
  - user_agent:
      match: "locationd*"
      policy: DIRECT
  - user_agent:
      match: "Maps*"
      policy: DIRECT
  - domain:
      match: gs-loc.apple.com
      policy: DIRECT
  - domain:
      match: gs-loc-cn.apple.com
      policy: DIRECT
  - domain_suffix:
      match: ls.apple.com
      policy: DIRECT
  - domain_suffix:
      match: ls.apple.com.akadns.net
      policy: DIRECT
  - domain_suffix:
      match: ls.apple.com.edgesuite.net
      policy: DIRECT
  - domain_wildcard:
      match: "*.smoot.apple.com"
      policy: DIRECT
  - domain_wildcard:
      match: "*.smoot.apple.cn"
      policy: DIRECT

  # App Store / iTunes API：代理
  - domain:
      match: apps.apple.com
      policy: Proxy
  - domain:
      match: xp.apple.com
      policy: Proxy
  - domain:
      match: bag.itunes.apple.com
      policy: Proxy
  - domain:
      match: api-edge.apps.apple.com
      policy: Proxy
  - domain:
      match: api.apps.apple.com
      policy: Proxy
  - domain:
      match: play.itunes.apple.com
      policy: Proxy
  - domain:
      match: se.itunes.apple.com
      policy: Proxy
  - domain:
      match: se-edge.itunes.apple.com
      policy: Proxy
  - domain:
      match: su.itunes.apple.com
      policy: Proxy
  - domain:
      match: upp.itunes.apple.com
      policy: Proxy
  - domain:
      match: beta.music.apple.com
      policy: Proxy
  - domain_keyword:
      match: buy.itunes.apple.com
      policy: Proxy
  - domain_suffix:
      match: itunes-apple.com.akadns.net
      policy: Proxy

  # Apple Intelligence / Siri 后端：代理
  - domain:
      match: apple-relay.apple.com
      policy: Proxy
  - domain:
      match: guzzoni.apple.com
      policy: Proxy

  # Apple News：代理
  - user_agent:
      match: "AppleNews*"
      policy: Proxy
  - domain_suffix:
      match: apple.news
      policy: Proxy
  - domain:
      match: news-events.apple.com
      policy: Proxy
  - domain:
      match: news-edge.apple.com
      policy: Proxy
  - domain:
      match: apple.comscoreresearch.com
      policy: Proxy

  # Apple CDN / 下载 / 更新：直连，保证速度和稳定性
  - domain:
      match: iosapps.itunes.apple.com
      policy: DIRECT
  - domain:
      match: osxapps.itunes.apple.com
      policy: DIRECT
  - domain:
      match: oscdn.apple.com
      policy: DIRECT
  - domain:
      match: supportdownload.apple.com
      policy: DIRECT
  - domain:
      match: appldnld.apple.com
      policy: DIRECT
  - domain:
      match: appldnld.apple.com.edgesuite.net
      policy: DIRECT
  - domain:
      match: swcdn.apple.com
      policy: DIRECT
  - domain:
      match: updates-http.cdn-apple.com
      policy: DIRECT
  - domain:
      match: updates.cdn-apple.com
      policy: DIRECT
  - domain_suffix:
      match: mzstatic.com
      policy: DIRECT
  - user_agent:
      match: "com.apple.appstored*"
      policy: DIRECT
  - domain:
      match: aod.itunes.apple.com
      policy: DIRECT
  - domain:
      match: mvod.itunes.apple.com
      policy: DIRECT
  - domain:
      match: streamingaudio.itunes.apple.com
      policy: DIRECT
  - domain:
      match: apptrailers.itunes.apple.com
      policy: DIRECT
  - domain:
      match: download.developer.apple.com
      policy: DIRECT
  - domain:
      match: downloaddispatch.itunes.apple.com
      policy: DIRECT
  - domain:
      match: app-site-association.cdn-apple.com
      policy: DIRECT

  # Apple 非中国 CDN / 流媒体 / OCSP：代理
  - domain_suffix:
      match: hls.itunes.apple.com
      policy: Proxy
  - domain_suffix:
      match: hls-amt.itunes.apple.com
      policy: Proxy
  - domain_suffix:
      match: audio-ssl.itunes.apple.com
      policy: Proxy
  - domain_suffix:
      match: cdn-apple.com
      policy: Proxy
  - domain:
      match: cdn.apple-cloudkit.com
      policy: Proxy
  - domain:
      match: devimages-cdn.apple.com
      policy: Proxy
  - domain:
      match: devstreaming-cdn.apple.com
      policy: Proxy
  - domain:
      match: js-cdn.music.apple.com
      policy: Proxy
  - domain:
      match: docs-assets.developer.apple.com
      policy: Proxy
  - domain_suffix:
      match: apple-dns.net
      policy: Proxy
  - domain_suffix:
      match: ocsp.apple.com
      policy: Proxy
  - user_agent:
      match: "com.apple.trustd*"
      policy: Proxy

  # iMessage / Apple Music / Apple TV / 通用 Apple 服务：代理
  - domain_suffix:
      match: ess.apple.com
      policy: Proxy
  - domain_suffix:
      match: music.apple.com
      policy: Proxy
  - domain_suffix:
      match: sonos-music.apple.com
      policy: Proxy
  - domain:
      match: configuration.apple.com
      policy: Proxy
  - domain_suffix:
      match: aaplimg.com
      policy: Proxy
  - domain_suffix:
      match: apple.co
      policy: Proxy
  - domain_suffix:
      match: itunes.com
      policy: Proxy
  - domain_suffix:
      match: itunes.apple.com
      policy: Proxy
  - domain_suffix:
      match: apple
      policy: Proxy
  - domain:
      match: weather-analytics-events.apple.com
      policy: Proxy

  # iCloud / CloudKit / Apple 主域：放在最后，避免覆盖前面的直连规则
  - domain_suffix:
      match: icloud-content.com
      policy: Proxy
  - domain_suffix:
      match: me.com
      policy: Proxy
  - domain_suffix:
      match: apple-cloudkit.com
      policy: Proxy
  - domain_suffix:
      match: icloud.com
      policy: Proxy
  - domain_suffix:
      match: apple.com
      policy: Proxy
